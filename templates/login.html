<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- tsParticles CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }

        /* tsParticles Container - Full Background */
        #tsparticles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 3D Login Container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 400px;
            transform-style: preserve-3d;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
            50% { transform: translateY(-25px) rotateX(8deg) rotateY(5deg); }
            100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.6s;
        }

        .login-box:hover {
            transform: translateY(-15px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
        }

        /* Institute Logo */
        .institute-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .institute-logo img {
            width: 120px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            color: white;
            font-size: 32px;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            position: relative;
            margin-bottom: 35px;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.18);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.5s;
            box-shadow: inset 6px 6px 12px rgba(0, 0, 0, 0.25);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            transform: scale(1.06);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.5s;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
        }

        button:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
        }

        button:active {
            transform: translateY(3px);
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 500;
            background: rgba(255, 107, 107, 0.15);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- tsParticles Background -->
    <div id="tsparticles"></div>

    <!-- 3D Login Container -->
    <div class="login-container">
        <div class="login-box">

            <!-- Institute Logo -->
            <div class="institute-logo">
                <img src="/static/images/hkmi.jpeg" alt="HKMI Institute Logo">
            </div>

            <h2>Admin Login</h2>

            {% if messages %}
                {% for msg in messages %}
                    <p class="error">{{ msg }}</p>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <!-- tsParticles Initialization Script -->
    <script>
        tsParticles.load("tsparticles", {
            background: {
                color: {
                    value: "transparent"
                }
            },
            fpsLimit: 60,
            interactivity: {
                detectsOn: "canvas",
                events: {
                    onHover: {
                        enable: true,
                        mode: "repulse"
                    },
                    resize: true
                },
                modes: {
                    repulse: {
                        distance: 100,
                        duration: 0.4
                    }
                }
            },
            particles: {
                color: {
                    value: ["#ffffff", "#4facfe", "#00f2fe"]
                },
                links: {
                    color: "#ffffff",
                    distance: 150,
                    enable: true,
                    opacity: 0.3,
                    width: 1
                },
                collisions: {
                    enable: true
                },
                move: {
                    direction: "none",
                    enable: true,
                    outModes: {
                        default: "bounce"
                    },
                    random: false,
                    speed: 2,
                    straight: false
                },
                number: {
                    density: {
                        enable: true,
                        area: 800
                    },
                    value: 80
                },
                opacity: {
                    value: 0.5
                },
                shape: {
                    type: "circle"
                },
                size: {
                    random: true,
                    value: { min: 2, max: 5 }
                }
            },
            detectRetina: true
        });
    </script>

</body>
</html>
